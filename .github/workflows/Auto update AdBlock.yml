name: 'Auto Update AdBlock'
on: 
#  push:
#    branches:
#    - main
  schedule:
  - cron: '0 */3 * * *'
  workflow_dispatch:
#  watch:
#    types: started
 

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4.1.1

      - name: CHN:AdRules DNS List
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_29.txt
          file-name: CHN:AdRules DNS List.txt

      - name: AdGuard DNS filter
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
          file-name: AdGuard DNS filter.txt

      - name: CHN:anti-AD
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_21.txt
          file-name: CHN:anti-AD.txt
          
      - name: fetch-github-hosts #GitHub规则
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://hosts.gitcdn.top/hosts.txt
          file-name: fetch-github-hosts.txt

      - name: GitHub520 #GitHub规则
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://raw.hellogithub.com/hosts
          file-name: GitHub520.txt

      - name: github hosts #GitHub规则
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://gh-proxy.com/https://raw.githubusercontent.com/jianboy/github-host/master/hosts
          file-name: github hosts.txt

      - name: ineo6 hosts #GitHub规则
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://gh-proxy.com/https://raw.githubusercontent.com/ineo6/hosts/master/next-hosts
          file-name: ineo6 hosts.txt

      - name: DNS #afwfv DD-AD DNS
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://raw.githubusercontent.com/afwfv/DD-AD/refs/heads/release/dns.txt
          file-name: DNS.txt

      - name: DD-AD #afwfv DD-AD 对本仓库上游规则的补充与修正, 不定期更新
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://raw.githubusercontent.com/afwfv/DD-AD/refs/heads/release/DD-AD.txt
          file-name: DD-AD.txt

      - name: Xinggsf_rule #乘风通用广告过滤规则
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://raw.githubusercontent.com/xinggsf/Adblock-Plus-Rule/master/rule.txt
          file-name: Xinggsf_rule.txt

      - name: Xinggsf_mv #乘风视频广告过滤规则
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://raw.githubusercontent.com/xinggsf/Adblock-Plus-Rule/master/mv.txt
          file-name: Xinggsf_mv.txt

      - name: Xinggsf_minority-mv #乘风小众视频规则
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://raw.githubusercontent.com/xinggsf/Adblock-Plus-Rule/master/minority-mv.txt
          file-name: Xinggsf_minority-mv.txt
  
      - name: Xinggsf_dynamic #乘风 uBlock Origin 动态规则
        uses: carlosperate/download-file-action@v2.0.1
        with: 
          file-url: https://raw.githubusercontent.com/xinggsf/Adblock-Plus-Rule/master/ublock-dynamic-rule.txt
          file-name: Xinggsf_dynamic.txt

      - name: Commit Changes
        env:
          TZ: Asia/Shanghai
        run: |
          if [ -z "$(git status --porcelain)" ]; then 
              exit 0
            else 
              git add .
              git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions bot"
              git commit -m ":pencil: Update at  $(date +"%Y-%m-%d %H:%M")" -a
            fi

      - name: GitHub Push #推送至库
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

          
#      - name: WeChat notification #用于微信推送通知（如有需要删除行头注释）
#        run: curl https://sc.ftqq.com/${{ secrets.ServerChan }}.send?text=${{ env.FILE_NAME }}AdBlock规则已更新
